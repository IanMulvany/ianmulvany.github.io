<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#020303">
  <title>Analog Count Display</title>
  <style>
    :root {
      --shake-x: 0px;
      --shake-y: 0px;
      --grid-x: 0px;
      --text-x: 0px;
      --text-y: 0px;
      --tear-top: 48%;
      --tear-offset: 0px;
      --tilt: 0deg;
      --burst-skew: 0deg;
      --burst-a: 0px;
      --burst-b: 0px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020303;
    }

    body {
      min-height: 100dvh;
      color: #fff;
      font-family: Impact, "Arial Black", "Helvetica Neue", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      touch-action: manipulation;
      cursor: none;
    }

    .tv {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse at center, rgba(230, 255, 255, 0.18) 0%, rgba(33, 72, 76, 0.16) 24%, rgba(5, 10, 12, 0.86) 61%, #010202 100%),
        linear-gradient(110deg, rgba(1, 27, 27, 0.7), rgba(17, 4, 9, 0.8) 49%, rgba(0, 0, 0, 0.95));
      transform: translate3d(var(--shake-x), var(--shake-y), 0) rotate(var(--tilt));
    }

    .tv::before {
      content: "";
      position: absolute;
      inset: -8vmin;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 51% 49%, rgba(255, 255, 255, 0.11), transparent 16vmin),
        radial-gradient(circle at 23% 27%, rgba(0, 255, 255, 0.15), transparent 28vmin),
        radial-gradient(circle at 74% 70%, rgba(255, 17, 67, 0.16), transparent 34vmin),
        linear-gradient(90deg, rgba(255, 0, 58, 0.06), transparent 31%, rgba(0, 229, 255, 0.08) 58%, transparent 88%);
      filter: blur(18px) saturate(1.6);
      mix-blend-mode: screen;
      animation: colorBreath 5.8s linear infinite;
    }

    .snow,
    .color-drift,
    .rolling-sync,
    .scanlines,
    .vignette,
    .screen-curve,
    .grid-ghost,
    .tear {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .snow {
      z-index: 3;
      width: 100%;
      height: 100%;
      opacity: 0.54;
      mix-blend-mode: screen;
      image-rendering: pixelated;
      filter: contrast(1.85) brightness(1.15);
    }

    .grid-ghost {
      z-index: 2;
      opacity: 0.14;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.42) 0 1px, transparent 1.6px) 0 0 / 44px 36px,
        repeating-linear-gradient(90deg, transparent 0 88px, rgba(255, 255, 255, 0.08) 90px 91px),
        repeating-linear-gradient(0deg, transparent 0 72px, rgba(255, 255, 255, 0.06) 73px 74px);
      filter: blur(0.8px);
      transform: translate3d(var(--grid-x), 0, 0);
    }

    .color-drift {
      z-index: 4;
      opacity: 0.47;
      background:
        repeating-linear-gradient(90deg, rgba(255, 0, 64, 0.1) 0 8vw, rgba(0, 230, 255, 0.12) 8vw 16vw, rgba(255, 255, 255, 0.04) 16vw 24vw),
        linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.08) 49%, transparent 56%);
      mix-blend-mode: screen;
      filter: blur(9px) saturate(1.35);
      animation: driftBands 4.4s linear infinite;
    }

    .rolling-sync {
      z-index: 5;
      opacity: 0.7;
      background:
        linear-gradient(180deg, transparent 0 24%, rgba(255, 255, 255, 0.28) 27%, rgba(0, 255, 255, 0.12) 29%, transparent 33%),
        linear-gradient(180deg, transparent 0 58%, rgba(255, 30, 90, 0.18) 61%, transparent 67%),
        linear-gradient(180deg, transparent 0 82%, rgba(255, 255, 255, 0.16) 84%, transparent 88%);
      mix-blend-mode: screen;
      filter: blur(1px);
      animation: rollDown 3.7s linear infinite;
    }

    .scanlines {
      z-index: 13;
      opacity: 0.75;
      background:
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.07) 0 1px, rgba(0, 0, 0, 0.28) 1px 3px, rgba(0, 0, 0, 0.08) 3px 5px),
        repeating-linear-gradient(90deg, rgba(255, 0, 0, 0.08) 0 1px, rgba(0, 255, 255, 0.04) 1px 2px, transparent 2px 4px);
      mix-blend-mode: overlay;
      animation: scanCrawl 260ms linear infinite;
    }

    .screen-curve {
      z-index: 14;
      inset: -2px;
      border-radius: 5vmin;
      box-shadow:
        inset 0 0 5vmin rgba(255, 255, 255, 0.05),
        inset 0 0 14vmin rgba(0, 0, 0, 0.58),
        inset 0 0 1.2vmin rgba(255, 255, 255, 0.11);
      background:
        radial-gradient(ellipse at center, transparent 0 59%, rgba(0, 0, 0, 0.28) 78%, rgba(0, 0, 0, 0.9) 100%);
    }

    .vignette {
      z-index: 16;
      box-shadow: inset 0 0 16vmin 7vmin rgba(0, 0, 0, 0.9);
      background:
        radial-gradient(ellipse at center, transparent 0 48%, rgba(0, 0, 0, 0.36) 73%, rgba(0, 0, 0, 0.86) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.5), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.46));
    }

    .tear {
      z-index: 12;
      top: var(--tear-top);
      bottom: auto;
      height: clamp(26px, 7vh, 92px);
      opacity: 0.6;
      transform: translate3d(var(--tear-offset), 0, 0);
      background:
        linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.42), rgba(0, 255, 255, 0.2), transparent),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.12) 0 22px, rgba(255, 0, 72, 0.12) 22px 44px, rgba(0, 229, 255, 0.12) 44px 66px);
      mix-blend-mode: screen;
      filter: blur(2px) contrast(1.3);
    }

    .count-shell {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: grid;
      place-items: center;
      padding: max(2rem, env(safe-area-inset-top)) max(2rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(2rem, env(safe-area-inset-left));
      text-align: center;
    }

    .counter {
      position: relative;
      display: inline-block;
      color: #fff;
      font-size: clamp(10rem, 54vmin, 44rem);
      font-weight: 900;
      line-height: 0.84;
      letter-spacing: 0;
      transform:
        translate3d(var(--text-x), var(--text-y), 0)
        skewX(var(--burst-skew));
      text-shadow:
        0 0 0.018em rgba(255, 255, 255, 0.95),
        0 0 0.08em rgba(228, 255, 255, 0.84),
        0.018em 0 0 rgba(0, 240, 255, 0.9),
        -0.023em 0 0 rgba(255, 0, 70, 0.84),
        0 0 0.18em rgba(255, 255, 255, 0.36);
      filter: contrast(1.15);
      animation: textPulse 90ms steps(2, end) infinite;
    }

    .counter.word {
      font-size: clamp(4.7rem, 22vmin, 18rem);
      line-height: 0.92;
    }

    .counter span {
      position: relative;
      z-index: 3;
      display: inline-block;
    }

    .counter::before,
    .counter::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.72;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .counter::before {
      color: #44f7ff;
      transform: translate3d(calc(-0.03em - var(--burst-a)), 0.01em, 0);
      clip-path: polygon(0 0, 100% 0, 100% 34%, 0 39%);
      animation: rgbSlipA 640ms steps(2, end) infinite;
    }

    .counter::after {
      color: #ff1559;
      transform: translate3d(calc(0.026em + var(--burst-b)), -0.009em, 0);
      clip-path: polygon(0 55%, 100% 49%, 100% 100%, 0 100%);
      animation: rgbSlipB 720ms steps(2, end) infinite;
    }

    .tv.blank .counter {
      opacity: 0;
    }

    .tv.hit .counter {
      animation:
        textPulse 70ms steps(2, end) infinite,
        impactFlash 240ms steps(3, end) 1;
    }

    .tv.hit::after {
      content: "";
      position: absolute;
      inset: -10%;
      z-index: 11;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(180deg, transparent 0 23%, rgba(255, 255, 255, 0.72) 24%, transparent 29%),
        linear-gradient(180deg, transparent 0 64%, rgba(0, 255, 255, 0.34) 65%, rgba(255, 0, 70, 0.34) 67%, transparent 72%);
      mix-blend-mode: screen;
      animation: hitSweep 260ms steps(3, end) 1;
    }

    @keyframes colorBreath {
      0% { transform: translate3d(-2%, -1%, 0) scale(1.03); opacity: 0.76; }
      35% { transform: translate3d(2%, 1%, 0) scale(1.06); opacity: 0.92; }
      70% { transform: translate3d(-1%, 2%, 0) scale(1.04); opacity: 0.64; }
      100% { transform: translate3d(-2%, -1%, 0) scale(1.03); opacity: 0.76; }
    }

    @keyframes driftBands {
      0% { transform: translate3d(-14vw, 0, 0); }
      100% { transform: translate3d(14vw, 0, 0); }
    }

    @keyframes rollDown {
      0% { transform: translate3d(0, -125%, 0); }
      100% { transform: translate3d(0, 125%, 0); }
    }

    @keyframes scanCrawl {
      0% { transform: translateY(0); }
      100% { transform: translateY(5px); }
    }

    @keyframes textPulse {
      0% { opacity: 0.94; filter: brightness(1.12) contrast(1.08); }
      50% { opacity: 1; filter: brightness(1.28) contrast(1.22); }
      100% { opacity: 0.9; filter: brightness(1.06) contrast(1.1); }
    }

    @keyframes rgbSlipA {
      0%, 100% { transform: translate3d(-0.028em, 0.012em, 0); }
      45% { transform: translate3d(-0.048em, -0.006em, 0); }
      60% { transform: translate3d(-0.012em, 0.016em, 0); }
    }

    @keyframes rgbSlipB {
      0%, 100% { transform: translate3d(0.026em, -0.009em, 0); }
      40% { transform: translate3d(0.05em, 0.008em, 0); }
      62% { transform: translate3d(0.014em, -0.014em, 0); }
    }

    @keyframes impactFlash {
      0% { transform: translate3d(-0.04em, 0, 0) skewX(-5deg); opacity: 0.2; }
      34% { transform: translate3d(0.035em, -0.015em, 0) skewX(4deg); opacity: 1; }
      67% { transform: translate3d(-0.018em, 0.012em, 0) skewX(-2deg); opacity: 0.68; }
      100% { transform: translate3d(var(--text-x), var(--text-y), 0) skewX(0); opacity: 1; }
    }

    @keyframes hitSweep {
      0% { opacity: 0.88; transform: translateY(-8%); }
      55% { opacity: 0.42; transform: translateY(3%); }
      100% { opacity: 0; transform: translateY(9%); }
    }

    @media (orientation: portrait) {
      .counter {
        font-size: clamp(9rem, 48vmin, 34rem);
      }

      .counter.word {
        font-size: clamp(3.9rem, 18vmin, 13rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tv,
      .tv::before,
      .counter,
      .counter::before,
      .counter::after,
      .color-drift,
      .rolling-sync,
      .scanlines {
        animation-duration: 1.8s;
      }
    }
  </style>
</head>
<body>
  <main class="tv" id="tv" aria-label="Analog counting display">
    <canvas class="snow" id="snow" aria-hidden="true"></canvas>
    <div class="grid-ghost" aria-hidden="true"></div>
    <div class="color-drift" aria-hidden="true"></div>
    <div class="rolling-sync" aria-hidden="true"></div>
    <div class="tear" id="tear" aria-hidden="true"></div>
    <section class="count-shell" aria-hidden="true">
      <div class="counter" id="counter" data-text="1"><span id="display">1</span></div>
    </section>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="screen-curve" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
  </main>

  <script>
    (() => {
      const tv = document.getElementById("tv");
      const counter = document.getElementById("counter");
      const display = document.getElementById("display");
      const tear = document.getElementById("tear");
      const snow = document.getElementById("snow");
      const ctx = snow.getContext("2d", { alpha: true });

      const sequence = [
        { text: "1", duration: 760 },
        { text: "2", duration: 760 },
        { text: "3", duration: 760 },
        { text: "eins", duration: 880 },
        { text: "zwei", duration: 880 },
        { text: "drei", duration: 880 },
        { text: "", duration: 1350 }
      ];

      let current = 0;
      let hitTimer = 0;
      let snowFrame = null;
      let noiseData = null;
      let wakeLock = null;

      function setCount() {
        const item = sequence[current];
        const text = item.text;

        display.textContent = text;
        counter.dataset.text = text || " ";
        counter.classList.toggle("word", text.length > 1);
        tv.classList.toggle("blank", text === "");
        tv.classList.add("hit");

        window.clearTimeout(hitTimer);
        hitTimer = window.setTimeout(() => tv.classList.remove("hit"), 260);

        current = (current + 1) % sequence.length;
        window.setTimeout(setCount, item.duration);
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function jitter() {
        const heavy = Math.random() < 0.16;
        const shake = heavy ? 10 : 2.4;
        const textShake = heavy ? 13 : 3.5;

        tv.style.setProperty("--shake-x", `${randomRange(-shake, shake).toFixed(2)}px`);
        tv.style.setProperty("--shake-y", `${randomRange(-shake * 0.45, shake * 0.45).toFixed(2)}px`);
        tv.style.setProperty("--grid-x", `${randomRange(-shake * 2, shake * 2).toFixed(2)}px`);
        tv.style.setProperty("--tilt", `${randomRange(-0.08, 0.08).toFixed(3)}deg`);
        tv.style.setProperty("--text-x", `${randomRange(-textShake, textShake).toFixed(2)}px`);
        tv.style.setProperty("--text-y", `${randomRange(-textShake * 0.38, textShake * 0.38).toFixed(2)}px`);
        tv.style.setProperty("--burst-skew", heavy ? `${randomRange(-2.2, 2.2).toFixed(2)}deg` : "0deg");
        tv.style.setProperty("--burst-a", heavy ? `${randomRange(2, 7).toFixed(2)}px` : "0px");
        tv.style.setProperty("--burst-b", heavy ? `${randomRange(2, 6).toFixed(2)}px` : "0px");
      }

      function tearFrame() {
        const visible = Math.random() < 0.78;
        tear.style.opacity = visible ? randomRange(0.12, 0.86).toFixed(2) : "0";
        tv.style.setProperty("--tear-top", `${randomRange(7, 88).toFixed(2)}%`);
        tv.style.setProperty("--tear-offset", `${randomRange(-34, 34).toFixed(2)}px`);
      }

      function resizeNoise() {
        const width = Math.max(220, Math.min(520, Math.floor(window.innerWidth / 3)));
        const height = Math.max(160, Math.min(390, Math.floor(window.innerHeight / 3)));

        snow.width = width;
        snow.height = height;
        noiseData = ctx.createImageData(width, height);
      }

      function drawNoise() {
        if (!noiseData) {
          resizeNoise();
        }

        const data = noiseData.data;
        const width = snow.width;
        const height = snow.height;
        const dense = Math.random() < 0.22;

        for (let i = 0; i < data.length; i += 4) {
          const sparkle = Math.random() < 0.018;
          const base = sparkle ? 255 : Math.floor(Math.random() * (dense ? 245 : 180));
          const tint = Math.random();

          data[i] = tint < 0.33 ? base : Math.floor(base * randomRange(0.64, 1));
          data[i + 1] = tint > 0.33 && tint < 0.66 ? base : Math.floor(base * randomRange(0.7, 1));
          data[i + 2] = tint > 0.66 ? base : Math.floor(base * randomRange(0.72, 1));
          data[i + 3] = sparkle ? randomRange(155, 245) : randomRange(25, dense ? 126 : 88);
        }

        ctx.putImageData(noiseData, 0, 0);

        for (let y = 0; y < height; y += Math.floor(randomRange(5, 18))) {
          if (Math.random() < 0.22) {
            ctx.fillStyle = `rgba(255,255,255,${randomRange(0.05, 0.28).toFixed(3)})`;
            ctx.fillRect(0, y, width, randomRange(1, 3));
          }
        }

        if (Math.random() < 0.12) {
          const y = Math.floor(randomRange(0, height));
          const h = Math.floor(randomRange(5, 22));
          ctx.fillStyle = Math.random() < 0.5 ? "rgba(0,230,255,0.34)" : "rgba(255,20,80,0.32)";
          ctx.fillRect(0, y, width, h);
        }

        snowFrame = window.setTimeout(() => window.requestAnimationFrame(drawNoise), 38);
      }

      async function requestImmersiveMode() {
        const root = document.documentElement;

        if (!document.fullscreenElement && root.requestFullscreen) {
          try {
            await root.requestFullscreen({ navigationUI: "hide" });
          } catch (error) {
            // Some iPadOS browser modes only allow true fullscreen from Home Screen.
          }
        }

        if ("wakeLock" in navigator) {
          try {
            wakeLock = await navigator.wakeLock.request("screen");
          } catch (error) {
          }
        }
      }

      document.addEventListener("pointerup", requestImmersiveMode);
      document.addEventListener("keydown", requestImmersiveMode);
      document.addEventListener("contextmenu", event => event.preventDefault());
      window.addEventListener("resize", resizeNoise);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          window.clearTimeout(snowFrame);
        } else {
          resizeNoise();
          drawNoise();
        }
      });

      resizeNoise();
      drawNoise();
      setCount();
      window.setInterval(jitter, 82);
      window.setInterval(tearFrame, 170);
    })();
  </script>
</body>
</html>
