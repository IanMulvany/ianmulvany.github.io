# Cloud Build config invoked by the dbt-cloudbuild trigger to run the dbt
# transformation suite (bronze -> silver -> gold) against BigQuery. The dbt
# project itself lives in a separate repo (bmj-data-platform-dbt) and is
# mounted/cloned here; this file is the CI runner contract referenced by
# terraform/dbt-cloudbuild (var dbt_build_filename).
#
# Auth: runs as the ${env}-dbt-runner service account (set on the trigger).
# Secrets (dbt service token, warehouse creds) come from Secret Manager — never
# inlined. Substitutions are provided by the trigger / scheduler.

substitutions:
  _DBT_TARGET: "dev"          # overridden per environment by the trigger
  _DBT_IMAGE: "europe-west2-docker.pkg.dev/${PROJECT_ID}/${_ENV}-dbt/dbt-runner:latest"
  _ENV: "dev"

steps:
  - id: dbt-deps
    name: "${_DBT_IMAGE}"
    entrypoint: dbt
    args: ["deps"]

  - id: dbt-build
    name: "${_DBT_IMAGE}"
    entrypoint: dbt
    args:
      - "build"
      - "--target"
      - "${_DBT_TARGET}"
      - "--fail-fast"

  - id: dbt-test
    name: "${_DBT_IMAGE}"
    entrypoint: dbt
    args: ["test", "--target", "${_DBT_TARGET}"]

options:
  logging: CLOUD_LOGGING_ONLY   # required when a custom service account is set
  dynamicSubstitutions: true

timeout: 3600s
