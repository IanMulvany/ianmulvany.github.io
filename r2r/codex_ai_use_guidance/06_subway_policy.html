<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>06 - Subway Policy</title>
  <style>
    :root {
      --bg: #0d1727;
      --panel: #13233a;
      --ink: #edf4ff;
      --line: #4ac8ff;
      --line2: #ff8f3f;
      --line3: #80e27d;
      --node: #0a111d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Century Gothic", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #0b1422, #111f34);
    }
    main { width: min(1150px, 94vw); margin: 1rem auto 3rem; }
    .top { display: flex; justify-content: space-between; gap: 1rem; align-items: baseline; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 2.9rem); letter-spacing: 0.01em; }
    a { color: #8ad8ff; }
    .board {
      margin-top: 1rem;
      border: 2px solid #2f5f90;
      border-radius: 18px;
      padding: 1rem;
      background: var(--panel);
    }
    svg { width: 100%; height: auto; display: block; }
    .label { font: 700 14px/1.2 "Courier New", monospace; fill: #eff6ff; }
    .small { font: 600 12px/1.2 "Courier New", monospace; fill: #b9d5f8; }
    .dot { fill: var(--node); stroke: #fff; stroke-width: 2; }
    .caption {
      margin-top: 0.8rem;
      font-size: 0.95rem;
      line-height: 1.45;
      color: #d5e6fb;
      border-left: 4px solid #4ac8ff;
      padding-left: 0.7rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>06. AI Policy Subway Map</h1>
      <a href="./index.html">Back to Gallery</a>
    </div>
    <section class="board">
      <svg viewBox="0 0 1020 520" role="img" aria-label="Transit style map of AI guideline journey">
        <rect x="0" y="0" width="1020" height="520" fill="#11233b"/>
        <path d="M80 430 C220 430, 220 250, 360 250 C530 250, 530 120, 690 120 C840 120, 840 320, 950 320" stroke="var(--line)" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M80 80 C190 80, 210 170, 330 170 C470 170, 500 340, 620 340 C760 340, 770 220, 930 220" stroke="var(--line2)" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M130 470 C300 470, 320 390, 430 390 C610 390, 620 450, 850 450" stroke="var(--line3)" stroke-width="10" fill="none" stroke-linecap="round"/>

        <circle class="dot" cx="80" cy="430" r="11"/><text class="label" x="98" y="435">Start: Define AI task</text>
        <circle class="dot" cx="246" cy="329" r="11"/><text class="label" x="265" y="334">Policy check</text>
        <circle class="dot" cx="360" cy="250" r="11"/><text class="label" x="380" y="255">Secure tool selection</text>
        <circle class="dot" cx="550" cy="205" r="11"/><text class="label" x="570" y="210">Verify claims + citations</text>
        <circle class="dot" cx="690" cy="120" r="11"/><text class="label" x="710" y="125">Disclosure statement</text>
        <circle class="dot" cx="845" cy="228" r="11"/><text class="label" x="865" y="233">Human final review</text>
        <circle class="dot" cx="950" cy="320" r="11"/><text class="label" x="794" y="305">Submission-ready</text>

        <circle class="dot" cx="330" cy="170" r="9"/><text class="small" x="345" y="174">No AI authorship</text>
        <circle class="dot" cx="620" cy="340" r="9"/><text class="small" x="635" y="344">Confidentiality checkpoint</text>
        <circle class="dot" cx="430" cy="390" r="9"/><text class="small" x="445" y="394">Image rule checkpoint</text>
      </svg>
      <p class="caption">
        Each colored line represents a workflow lane. All lines converge on one requirement:
        transparent declaration plus human accountability.
      </p>
    </section>
  </main>
</body>
</html>
